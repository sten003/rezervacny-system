<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Študentský prehľad</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="header-top">
        <h1>Vitajte, <span th:text="${studentName}">Študent</span></h1>
        <a th:href="@{/logout}" class="btn logout-btn">Odhlásiť sa</a>
    </div>

    <h2>Dostupné termíny na konzultáciu</h2>
    <table>
        <thead>
        <tr>
            <th>Učiteľ</th>
            <th>Dátum a čas</th>
            <th>Popis</th>
            <th>Akcia</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="slot : ${availableSlots}">
            <td th:text="${slot.teacher.fullName}"></td>
            <td th:text="${#temporals.format(slot.startTime, 'dd.MM.yyyy HH:mm')} + ' - ' + ${#temporals.format(slot.endTime, 'HH:mm')}"></td>
            <td th:text="${slot.description}"></td>
            <td>
                <form action="/student/reserve" method="post">
                    <input type="hidden" name="slotId" th:value="${slot.id}">
                    <button type="submit" class="btn">Rezervovať</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(availableSlots)}">
            <td colspan="4" style="text-align: center;">Momentálne nie sú dostupné žiadne termíny.</td>
        </tr>
        </tbody>
    </table>

    <h2>Moje rezervácie</h2>
    <table>
        <thead>
        <tr>
            <th>Pedagóg</th>
            <th>Termín</th>
            <th>Stav</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="reservation : ${myReservations}">
            <td th:text="${reservation.slot.teacher.fullName}">Meno pedagóga</td>
            <td th:text="${reservation.slot.startTime + ' - ' + reservation.slot.endTime}">Čas</td>
            <td>
                <span th:if="${reservation.status == 'PENDING'}" style="color: orange; font-weight: bold;">Čaká na schválenie</span>
                <span th:if="${reservation.status == 'APPROVED'}" style="color: green; font-weight: bold;">Schválené</span>
                <span th:if="${reservation.status == 'REJECTED'}" style="color: red; font-weight: bold;">Zamietnuté</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
