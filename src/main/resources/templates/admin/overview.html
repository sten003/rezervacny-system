<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Prehľad</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="header-top">
        <h1>Vitajte, <span th:text="${adminName}">Admin</span></h1>
        <a th:href="@{/logout}" class="btn logout-btn">Odhlásiť sa</a>
    </div>

    <h2>Administrátorské nástroje</h2>

    <div style="margin-bottom: 20px;">
        <a th:href="@{/admin/create-user}" class="btn" style="background-color: #28a745;">+ Pridať nového používateľa</a>
    </div>

    <!-- Správa používateľov -->
    <div style="margin-top: 20px;">
        <h3>Zoznam používateľov</h3>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Prihlasovacie meno</th>
                <th>Celé meno</th>
                <th>Email</th>
                <th>Rola</th>
                <th>Akcie</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.fullName}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.role}"></td>
                <td>
                    <a th:href="@{/admin/edit-user/{id}(id=${user.id})}" class="btn" style="padding: 5px 10px; font-size: 12px;">Upraviť</a>

                    <form th:action="@{/admin/delete-user/{id}(id=${user.id})}" method="post" style="display:inline;" onsubmit="return confirm('Naozaj chcete zmazať tohto používateľa?');">
                        <button type="submit" style="background-color: darkred; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 12px;" th:disabled="${user.username == 'admin'}">Zmazať</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div style="margin-top: 30px; padding: 20px; border: 2px solid red; border-radius: 8px; background-color: #ffe6e6;">
        <h3 style="color: red; margin-top: 0;">!!!CAREFULL HERE!!!</h3>
        <p>Táto akcia je nenávratná!!! Vymaže všetky rezervačné sloty aj rezervácie!!!</p>

        <form th:action="@{/admin/cleanup-database}" method="post" onsubmit="return confirm('Ste si istý, že chcete VYMAZAŤ VŠETKY termíny a rezervácie z databázy? Túto akciu nemožno vrátiť späť!!!');">
            <button type="submit" style="background-color: red; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                VYMAZAŤ VŠETKY TERMÍNY A REZERVÁCIE
            </button>
        </form>
    </div>

</div>
</body>
</html>
