<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vytvorenie termínov</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="header-top">
        <h1>Vitajte, <span th:text="${teacherName}">Učiteľ</span></h1>
        <a th:href="@{/logout}" class="btn logout-btn">Odhlásiť sa</a>
    </div>

    <div class="button-row" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
        <a th:href="@{/teacher/overview}" class="btn">Prehľad termínov</a>
        <a th:href="@{/teacher/create-page}" class="btn">Vytvorenie termínov</a>
        <a th:href="@{/teacher/approvals}" class="btn">Schvaľovanie termínov</a>
    </div>

    <h2>Vytvoriť nový termín</h2>
    <form action="/teacher/create" method="post" onsubmit="prepareDates()" class="create-slot-form">

        <!-- datum a casy -->
        <div class="datetime-row">
            <!-- datum -->
            <div class="form-group inline-group">
                <label>Dátum:</label>
                <input type="date" id="dateInput" required>
            </div>

            <!-- casy -->
            <!-- zaciatok -->
            <div class="form-group inline-group">
                <label>Začiatok:</label>
                <div class="time-selects">
                    <select id="startHour" onchange="autoSetEndTime()">
                        <option value="07">07</option>
                        <option value="08">08</option>
                        <option value="09">09</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                        <option value="13">13</option>
                        <option value="14">14</option>
                        <option value="15">15</option>
                        <option value="16">16</option>
                    </select>
                    <span>:</span>
                    <select id="startMinute" onchange="autoSetEndTime()">
                        <option value="00">00</option>
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="30">30</option>
                        <option value="40">40</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>

            <!-- koniec -->
            <div class="form-group inline-group">
                <label>Koniec:</label>
                <div class="time-selects">
                    <select id="endHour">
                        <option value="07">07</option>
                        <option value="08">08</option>
                        <option value="09">09</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                        <option value="13">13</option>
                        <option value="14">14</option>
                        <option value="15">15</option>
                        <option value="16">16</option>
                        <option value="17">17</option>
                    </select>
                    <span>:</span>
                    <select id="endMinute">
                        <option value="00">00</option>
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="30">30</option>
                        <option value="40">40</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-group full-width">
            <label>Popis:</label>
            <input type="text" name="description" placeholder="Napr. Konzultácia k BP">
        </div>

        <!-- skryte polia kvoli jave -->
        <input type="hidden" name="start" id="realStartInput">
        <input type="hidden" name="end" id="realEndInput">

        <div class="button-row">
            <button type="submit" class="btn">Vytvoriť termín</button>
        </div>
    </form>

    <h2>Vytvoriť opakované termíny</h2>
    <div class="card mb-4">
        <div class="card-header"></div>
        <div class="card-body">
            <form action="/teacher/create-repeating-slots" method="post" onsubmit="prepareRepeatingTimes()" class="create-slot-form">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <div class="datetime-row">
                    <div class="form-group inline-group">
                        <label for="dayOfWeek">Deň v týždni:</label>
                        <select name="dayOfWeek" id="dayOfWeek" required>
                            <option value="MONDAY">Pondelok</option>
                            <option value="TUESDAY">Utorok</option>
                            <option value="WEDNESDAY">Streda</option>
                            <option value="THURSDAY">Štvrtok</option>
                            <option value="FRIDAY">Piatok</option>
                        </select>
                    </div>

                    <div class="form-group inline-group">
                        <label>Začiatok:</label>
                        <div class="time-selects">
                            <select id="repeatingStartHour" onchange="autoSetRepeatingEndTime()">
                                <option value="07">07</option>
                                <option value="08">08</option>
                                <option value="09">09</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                            </select>
                            <span>:</span>
                            <select id="repeatingStartMinute" onchange="autoSetRepeatingEndTime()">
                                <option value="00">00</option>
                                <option value="10">10</option>
                                <option value="20">20</option>
                                <option value="30">30</option>
                                <option value="40">40</option>
                                <option value="50">50</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group inline-group">
                        <label>Koniec:</label>
                        <div class="time-selects">
                            <select id="repeatingEndHour">
                                <option value="07">07</option>
                                <option value="08">08</option>
                                <option value="09">09</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="17">17</option>
                            </select>
                            <span>:</span>
                            <select id="repeatingEndMinute">
                                <option value="00">00</option>
                                <option value="10">10</option>
                                <option value="20">20</option>
                                <option value="30">30</option>
                                <option value="40">40</option>
                                <option value="50">50</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group inline-group">
                        <label for="weeks">Počet týždňov:</label>
                        <input type="number" name="weeks" id="weeks" min="1" max="13" value="3" required>
                    </div>
                </div>

                <input type="hidden" name="startTime" id="realRepeatingStartTime">
                <input type="hidden" name="endTime" id="realRepeatingEndTime">

                <div class="form-group full-width">
                    <label>Popis:</label>
                    <input type="text" name="description" placeholder="Napr. Konzultácia k BP">
                </div>

                <div class="button-row">
                    <button type="submit" class="btn">Vygenerovať termíny</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function autoSetEndTime() {
        var sHour = parseInt(document.getElementById('startHour').value);
        var sMin = parseInt(document.getElementById('startMinute').value);

        var totalMinutes = (sHour * 60) + sMin;
        var endTotalMinutes = totalMinutes + 30;

        //prepocet naspat na hodiny minuty
        var newEndHour = Math.floor(endTotalMinutes / 60);
        var newEndMin = endTotalMinutes % 60;

        var finalHourStr = newEndHour < 10 ? '0' + newEndHour : '' + newEndHour;
        var finalMinStr = newEndMin === 0 ? '00' : (newEndMin < 10 ? '0' + newEndMin : '' + newEndMin);

        var endHourSelect = document.getElementById('endHour');
        var endMinSelect = document.getElementById('endMinute');

        if(querySelectorOptionExists(endHourSelect, finalHourStr)) {
            endHourSelect.value = finalHourStr;
        }
        if(querySelectorOptionExists(endMinSelect, finalMinStr)) {
            endMinSelect.value = finalMinStr;
        }
    }

    //kontrola ci select obsahuje vsetky hodnoty
    function querySelectorOptionExists(selectElement, value) {
        for (var i = 0; i < selectElement.options.length; i++) {
            if (selectElement.options[i].value === value) {
                return true;
            }
        }
        return false;
    }

    function prepareDates() {
        var dateVal = document.getElementById('dateInput').value;

        var sHour = document.getElementById('startHour').value;
        var sMin = document.getElementById('startMinute').value;

        var eHour = document.getElementById('endHour').value;
        var eMin = document.getElementById('endMinute').value;

        //iso 8601
        var startDateTime = dateVal + 'T' + sHour + ':' + sMin;
        var endDateTime = dateVal + 'T' + eHour + ':' + eMin;

        //vlozit do skrytch poli ktore sa odoslu
        document.getElementById('realStartInput').value = startDateTime;
        document.getElementById('realEndInput').value = endDateTime;
    }

    function autoSetRepeatingEndTime() {
        var sHour = parseInt(document.getElementById("repeatingStartHour").value);
        var sMin = parseInt(document.getElementById("repeatingStartMinute").value);

        var totalMinutes = sHour * 60 + sMin;
        var endTotalMinutes = totalMinutes + 30;

        var newEndHour = Math.floor(endTotalMinutes / 60);
        var newEndMin = endTotalMinutes % 60;

        var finalHourStr = newEndHour < 10 ? "0" + newEndHour : "" + newEndHour;
        var finalMinStr = newEndMin === 0 ? "00" : (newEndMin < 10 ? "0" + newEndMin : "" + newEndMin);

        var endHourSelect = document.getElementById("repeatingEndHour");
        var endMinSelect = document.getElementById("repeatingEndMinute");

        if (querySelectorOptionExists(endHourSelect, finalHourStr)) {
            endHourSelect.value = finalHourStr;
        }
        if (querySelectorOptionExists(endMinSelect, finalMinStr)) {
            endMinSelect.value = finalMinStr;
        }
    }

    function prepareRepeatingTimes() {
        var sHour = document.getElementById("repeatingStartHour").value;
        var sMin = document.getElementById("repeatingStartMinute").value;
        var eHour = document.getElementById("repeatingEndHour").value;
        var eMin = document.getElementById("repeatingEndMinute").value;

        document.getElementById("realRepeatingStartTime").value = sHour + ":" + sMin;
        document.getElementById("realRepeatingEndTime").value = eHour + ":" + eMin;
    }

    //kvoli tomu aby sa koncovy cas nastavil automaticky o 30 neskor nie az ked uzivatel zmeni zaciatok
    document.addEventListener('DOMContentLoaded', function() {
        autoSetEndTime();
        autoSetRepeatingEndTime();
    });
</script>
</body>
</html>
